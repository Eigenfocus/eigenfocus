services:
  web:
    build:
      dockerfile: Dockerfile
    tty: true
    stdin_open: true
    command: run
    restart: unless-stopped
    volumes:
      - ./app-data:/usr/src/app/app-data
    environment:
     - DEFAULT_HOST_URL=http://localhost:3001
     # Uncomment for PostgreSQL (remove the SQLite volume above if not needed):
     # - POSTGRES_HOST=postgres
     # - POSTGRES_PORT=5432
     # - POSTGRES_DB_USER=eigenfocus
     # - POSTGRES_DB_PASSWORD=secret
     # - POSTGRES_DB_NAME=eigenfocus_production
    ports:
      - 3001:3000
