<% if ENV['POSTGRES_HOST'].present? %>
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: <%= ENV.fetch("POSTGRES_HOST") %>
  port: <%= ENV.fetch("POSTGRES_PORT", 5432) %>
  username: <%= ENV.fetch("POSTGRES_DB_USER", "postgres") %>
  password: <%= ENV.fetch("POSTGRES_DB_PASSWORD", "") %>

development:
  primary:
    <<: *default
    database: eigenfocus_development
    schema_dump: pg_schema.rb
  cable:
    <<: *default
    database: eigenfocus_development_cable
    migrations_paths: db/cable_migrate
    schema_dump: pg_cable_schema.rb
  queue:
    <<: *default
    database: eigenfocus_development_queue
    migrations_paths: db/queue_migrate
    schema_dump: pg_queue_schema.rb

test:
  primary:
    <<: *default
    database: eigenfocus_test
    schema_dump: pg_schema.rb
  cable:
    <<: *default
    database: eigenfocus_test_cable
    migrations_paths: db/cable_migrate
    schema_dump: pg_cable_schema.rb
  queue:
    <<: *default
    database: eigenfocus_test_queue
    migrations_paths: db/queue_migrate
    schema_dump: pg_queue_schema.rb

production:
  primary:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_NAME", "eigenfocus_production") %>
    schema_dump: pg_schema.rb

  cable:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_NAME", "eigenfocus_production") %>_cable
    migrations_paths: db/cable_migrate
    schema_dump: pg_cable_schema.rb

  queue:
    <<: *default
    database: <%= ENV.fetch("POSTGRES_DB_NAME", "eigenfocus_production") %>_queue
    migrations_paths: db/queue_migrate
    schema_dump: pg_queue_schema.rb

<% else %>
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  cable:
    <<: *default
    database: storage/development_cable.sqlite3
    migrations_paths: db/cable_migrate
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary:
    <<: *default
    database: app-data/database/production.sqlite3
  cable:
    <<: *default
    database: app-data/database/production_cable.sqlite3
    migrations_paths: db/cable_migrate
  queue:
    <<: *default
    database: app-data/database/production_queue.sqlite3
    migrations_paths: db/queue_migrate
<% end %>
